plugins {
    id 'com.android.application'
}

android {
    namespace 'com.vpnhotspot'
    compileSdk 34

    defaultConfig {
        applicationId "com.vpnhotspot"
        minSdk 21
        targetSdk 34
        versionCode 5
        versionName "1.4"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
